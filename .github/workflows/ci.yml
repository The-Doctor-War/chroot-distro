name: CI Check

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    check:
        name: Lint & Type Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install Linting & Typing Tools
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ruff pyright

            - name: Run Ruff Check
              run: ruff check src/chroot_distro

            - name: Run Pyright Type Check
              run: pyright src/chroot_distro
